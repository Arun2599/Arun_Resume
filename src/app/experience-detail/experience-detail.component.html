<div class="experience-detail" *ngIf="currentExperience" [@fadeIn]>
  <!-- Header -->
  <header class="detail-header">
    <button class="back-btn" (click)="goBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      <span>Back</span>
    </button>

    <div class="header-center">
      <span class="company-icon" [ngSwitch]="currentExperience.id" aria-hidden="true">
        <svg *ngSwitchCase="'surfboard'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="14" x="2" y="5" rx="2"/>
          <line x1="2" x2="22" y1="10" y2="10"/>
        </svg>
        <svg *ngSwitchCase="'maven'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 19 7-7 3 3-7 7-3-3z"/>
          <path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="m2 2 7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
        <svg *ngSwitchCase="'techcora'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
          <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
          <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
          <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
        </svg>
      </span>
      <div class="company-info">
        <h1 class="company-name">{{ currentExperience.company }}</h1>
        <p class="company-role">{{ currentExperience.role }}</p>
      </div>
    </div>

    <div class="header-right">
      <div class="counter">
        <span class="counter-current">{{ (currentProjectIndex + 1).toString().padStart(2, '0') }}</span>
        <span class="counter-divider">/</span>
        <span class="counter-total">{{ totalProjects.toString().padStart(2, '0') }}</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="detail-content"
        (mouseenter)="pauseCarousel()"
        (mouseleave)="resumeCarousel()"
        (touchstart)="onTouchStart($event)"
        (touchend)="onTouchEnd($event)">

    <!-- Navigation Arrows - Desktop -->
    <button class="nav-btn nav-prev" (click)="prevProject()" [class.hidden]="totalProjects <= 1">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    <!-- Cards Carousel -->
    <div class="carousel-container">
      <div class="cards-track" [style.transform]="'translateX(calc(50% - 160px + ' + getTrackOffset() + 'px))'">
        <div
          class="project-card"
          *ngFor="let project of currentExperience.projects; let i = index"
          [class.active]="i === currentProjectIndex"
          [class.prev]="i < currentProjectIndex"
          [class.next]="i > currentProjectIndex"
          (click)="goToProject(i)"
        >
          <!-- Card Image -->
          <div class="card-image" [style.background-image]="'url(' + project.image + ')'">
            <div class="card-gradient" [style.background]="'linear-gradient(180deg, transparent 20%, ' + project.color + ' 100%)'"></div>
            <div class="card-image-content">
              <h2 class="project-name">{{ project.name }}</h2>
              <div class="project-highlights">
                <span class="highlight" *ngFor="let h of project.highlights" [style.border-color]="project.color">{{ h }}</span>
              </div>
            </div>
          </div>

          <!-- Card Body -->
          <div class="card-body">
            <p class="project-description">{{ project.description }}</p>
            <div class="project-skills">
              <span class="skill" *ngFor="let skill of project.skills">{{ skill }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Navigation Arrows - Desktop -->
    <button class="nav-btn nav-next" (click)="nextProject()" [class.hidden]="totalProjects <= 1">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </main>

  <!-- Pagination Dots -->
  <footer class="detail-footer">
    <div class="pagination-dots">
      <button
        class="dot"
        *ngFor="let project of currentExperience.projects; let i = index"
        [class.active]="i === currentProjectIndex"
        (click)="goToProject(i)"
      >
        <span class="dot-progress" [class.running]="i === currentProjectIndex && !isCarouselPaused"></span>
      </button>
    </div>
    <p class="swipe-hint">Swipe or use arrow keys to navigate</p>
  </footer>
</div>
