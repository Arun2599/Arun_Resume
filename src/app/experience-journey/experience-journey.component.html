<section id="journey-section" appScrollAnimate>
  <!-- Section Header -->
  <div class="journey-header">
    <span class="section-label">Experience</span>
    <h2 class="section-title">Curious What I've <span class="gradient-text">Created?</span></h2>
    <p class="section-subtitle">Explore projects from my professional journey</p>
  </div>

  <!-- Company Cards Grid -->
  <div class="companies-grid" [@staggerCards]="experiences.length">
    <button
      type="button"
      class="company-card"
      *ngFor="let exp of experiences; let i = index"
      (click)="openExperience(exp)"
      [attr.aria-label]="'View ' + exp.projectCount + ' projects from ' + exp.company"
      [@fadeInUp]
    >
      <span class="card-arrow" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="7" y1="17" x2="17" y2="7"></line>
          <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
      </span>
      <div class="card-inner">
        <div class="company-icon-wrapper" [ngSwitch]="exp.id" aria-hidden="true">
          <svg *ngSwitchCase="'surfboard'" class="company-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="14" x="2" y="5" rx="2"/>
            <line x1="2" x2="22" y1="10" y2="10"/>
          </svg>
          <svg *ngSwitchCase="'maven'" class="company-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19 7-7 3 3-7 7-3-3z"/>
            <path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="m2 2 7.586 7.586"/>
            <circle cx="11" cy="11" r="2"/>
          </svg>
          <svg *ngSwitchCase="'techcora'" class="company-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
            <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
            <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
            <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
          </svg>
        </div>
        <div class="company-details">
          <h3 class="company-name">{{ exp.company }}</h3>
          <p class="company-role">{{ exp.role }}</p>
        </div>
        <div class="period-info">
          <span class="period-badge" [class.present]="exp.period.includes('Present')">
            {{ exp.period }}
          </span>
          <span class="duration-badge">{{ exp.duration }}</span>
        </div>
        <div class="projects-preview">
          <span class="projects-cta">
            <span class="projects-count">{{ exp.projectCount }}</span>
            <span class="projects-label">Projects</span>
          </span>
          <span class="explore-link">
            Explore
            <svg class="explore-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </div>
      </div>
    </button>
  </div>
</section>
