<section id="journey-section" appScrollAnimate>
  <!-- Section Header -->
  <div class="journey-header">
    <span class="section-label">Experience</span>
    <h2 class="section-title">Curious What I've <span class="gradient-text">Created?</span></h2>
    <p class="section-subtitle">Explore projects from my professional journey</p>
  </div>

  <!-- Company Cards Grid -->
  <div class="companies-grid" [@staggerCards]="experiences.length">
    <div
      class="company-card"
      *ngFor="let exp of experiences; let i = index"
      (click)="openExperience(exp)"
      [@fadeInUp]
    >
      <div class="card-inner">
        <div class="company-icon-wrapper">
          <span class="company-icon">{{ exp.icon }}</span>
        </div>
        <div class="company-details">
          <h3 class="company-name">{{ exp.company }}</h3>
          <p class="company-role">{{ exp.role }}</p>
        </div>
        <div class="period-info">
          <span class="period-badge" [class.present]="exp.period.includes('Present')">
            {{ exp.period }}
          </span>
          <span class="duration-badge">{{ exp.duration }}</span>
        </div>
        <div class="projects-preview">
          <span class="projects-count">{{ exp.projectCount }}</span>
          <span class="projects-label">Projects</span>
        </div>
      </div>
    </div>
  </div>
</section>
